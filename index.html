<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Automotive Interims — Závěrečný Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --teal: #008080;
  --deep-teal: #0A6C6C;
  --gold: #FFDB58;
  --muted-gold: #C9A227;
  --graphite: #0E1116;
  --bone: #ECE8E0;
  --slate: #3E4A57;
  --fog: #E9EEF2;
  --white: #FFFFFF;
  --red: #D32F2F;
  --red-bg: #FEF2F2;
  --red-border: #FECACA;
  --amber: #F9A825;
  --amber-bg: #FFFBEB;
  --amber-border: #FDE68A;
  --green: #2E7D32;
  --green-bg: #F0FDF4;
  --green-border: #BBF7D0;
  --blue: #1E6BB8;
  --blue-bg: #EFF6FF;
  --blue-border: #BFDBFE;
  --teal-bg: #F0FDFA;
  --teal-border: #99F6E4;
  --radius: 12px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,.06);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  font-size: 16px;
  line-height: 1.7;
  color: var(--graphite);
  background: var(--white);
  -webkit-font-smoothing: antialiased;
}

/* ── LOGIN ── */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--bone) 0%, var(--fog) 100%);
}
.login-box {
  background: var(--white);
  border-radius: 16px;
  padding: 48px 40px 40px;
  width: 380px;
  max-width: 90vw;
  box-shadow: var(--shadow-md);
  text-align: center;
}
.login-shield { height: 48px; margin-bottom: 12px; display: block; margin-left: auto; margin-right: auto; }
.login-logo { height: 28px; margin-bottom: 28px; opacity: .7; }
.login-box h2 {
  font-size: 18px;
  font-weight: 600;
  color: var(--slate);
  margin-bottom: 24px;
}
.login-box input {
  width: 100%;
  padding: 12px 16px;
  border: 1.5px solid #ddd;
  border-radius: 10px;
  font-size: 15px;
  font-family: inherit;
  margin-bottom: 12px;
  transition: border-color .2s;
  background: var(--fog);
}
.login-box input:focus { outline: none; border-color: var(--teal); background: var(--white); }
.login-box button {
  width: 100%;
  padding: 13px;
  background: var(--gold);
  color: var(--graphite);
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background .2s;
  margin-top: 4px;
}
.login-box button:hover { background: var(--muted-gold); color: var(--white); }
.login-error { color: var(--red); font-size: 13px; margin-top: 12px; display: none; }

/* ── LAYOUT ── */
#app { display: none; }
#app.visible { display: block; }

/* Top nav bar */
.top-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--white);
  border-bottom: 1px solid #e5e5e5;
  display: flex;
  align-items: center;
  padding: 0 24px;
  height: 56px;
  gap: 12px;
  backdrop-filter: blur(8px);
  background: rgba(255,255,255,.92);
}
.top-bar-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--graphite);
  white-space: nowrap;
  margin-right: auto;
}
.top-bar button {
  background: var(--fog);
  border: none;
  color: var(--slate);
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
}
.top-bar button:hover { background: var(--bone); color: var(--graphite); }
.hamburger {
  display: none;
  background: none !important;
  border: none;
  color: var(--graphite);
  font-size: 22px;
  cursor: pointer;
  padding: 4px 8px;
}

/* Sidebar TOC */
.layout { display: flex; min-height: calc(100vh - 56px); }
.sidebar {
  width: 260px;
  flex-shrink: 0;
  background: var(--white);
  border-right: 1px solid #eee;
  position: sticky;
  top: 56px;
  height: calc(100vh - 56px);
  overflow-y: auto;
  padding: 20px 0;
}
.sidebar a {
  display: block;
  padding: 8px 20px;
  color: var(--slate);
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  line-height: 1.4;
  border-left: 3px solid transparent;
  transition: all .15s;
}
.sidebar a:hover, .sidebar a.active {
  color: var(--teal);
  background: var(--teal-bg);
  border-left-color: var(--teal);
}

/* Content area */
.content {
  flex: 1;
  max-width: 860px;
  margin: 0 auto;
  padding: 48px 48px 100px;
}

/* ── HERO HEADER ── */
.report-hero {
  background: var(--graphite);
  color: var(--white);
  padding: 56px 48px 48px;
  border-radius: 0 0 var(--radius) var(--radius);
  margin: -48px -48px 40px;
  position: relative;
  overflow: hidden;
}
.report-hero::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(135deg, rgba(0,128,128,.15) 0%, transparent 60%);
  pointer-events: none;
}
.report-hero h1,
.content .report-hero h1 {
  font-size: 32px;
  font-weight: 800;
  color: #FFFFFF !important;
  margin: 0 0 8px;
  border: none;
  line-height: 1.2;
  position: relative;
}
.report-hero h2,
.content .report-hero h2 {
  font-size: 18px;
  font-weight: 500;
  color: var(--gold) !important;
  margin: 0 0 16px;
  position: relative;
}
.report-hero p,
.content .report-hero p {
  font-size: 13px;
  color: rgba(255,255,255,.6) !important;
  margin: 0;
  position: relative;
}
.report-hero .hero-line {
  width: 48px;
  height: 3px;
  background: var(--teal);
  border-radius: 2px;
  margin-bottom: 20px;
  position: relative;
}

/* ── SECTION LABELS ── */
.section-label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--teal);
  margin-bottom: 8px;
}

/* ── TYPOGRAPHY ── */
.content h1 {
  font-size: 30px;
  font-weight: 800;
  color: var(--graphite);
  margin: 64px 0 20px;
  line-height: 1.2;
}
.content h1:first-child { margin-top: 0; }
.content h2 {
  font-size: 22px;
  font-weight: 700;
  color: var(--teal);
  margin: 48px 0 16px;
}
.content h3 {
  font-size: 17px;
  font-weight: 700;
  color: var(--graphite);
  margin: 32px 0 12px;
}
.content p { margin: 0 0 16px; color: var(--graphite); }
.content strong { font-weight: 600; }
.content em { color: var(--slate); }
.content ul, .content ol {
  margin: 0 0 20px;
  padding-left: 24px;
}
.content li {
  margin-bottom: 8px;
  line-height: 1.65;
}
.content li::marker { color: var(--teal); }
.content hr {
  border: none;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--bone), transparent);
  margin: 56px 0;
}

/* ── CALLOUTS ── */
.callout {
  border-radius: var(--radius);
  padding: 20px 24px;
  margin: 20px 0 24px;
  font-size: 15px;
  line-height: 1.65;
  border-left: 4px solid;
}
.callout p { margin: 0; }
.callout-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
  display: block;
}
.callout-key {
  background: var(--teal-bg);
  border-color: var(--teal);
}
.callout-key .callout-label { color: var(--teal); }
.callout-warning {
  background: var(--amber-bg);
  border-color: var(--amber);
}
.callout-warning .callout-label { color: #B45309; }
.callout-info {
  background: var(--blue-bg);
  border-color: var(--blue);
}
.callout-info .callout-label { color: var(--blue); }
.callout-mandate {
  background: var(--fog);
  border-color: var(--slate);
  font-weight: 500;
}

/* ── TABLES ── */
.table-wrap {
  overflow-x: auto;
  margin: 16px 0 28px;
  border-radius: var(--radius);
  border: 1px solid #e5e5e5;
  box-shadow: var(--shadow-sm);
}
.content table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
  min-width: 400px;
}
.content thead { background: var(--fog); }
.content th {
  padding: 12px 16px;
  text-align: left;
  font-weight: 700;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--slate);
  border-bottom: 2px solid #e5e5e5;
}
.content td {
  padding: 12px 16px;
  border-bottom: 1px solid #f0f0f0;
  color: var(--graphite);
}
.content tbody tr:hover { background: var(--fog); }

/* ── KPI STAT CARDS ── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin: 28px 0 36px;
}
.kpi-card {
  background: var(--white);
  border: 1px solid #e5e5e5;
  border-radius: var(--radius);
  padding: 24px 16px;
  text-align: center;
  box-shadow: var(--shadow-sm);
  transition: box-shadow .2s;
}
.kpi-card:hover { box-shadow: var(--shadow-md); }
.kpi-value {
  font-size: 28px;
  font-weight: 800;
  color: var(--teal);
  line-height: 1.2;
  margin-bottom: 6px;
}
.kpi-value.gold { color: var(--muted-gold); }
.kpi-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--slate);
  line-height: 1.4;
}
.kpi-sub {
  font-size: 11px;
  font-weight: 400;
  color: #999;
  margin-top: 2px;
}

/* ── TWO COLUMN ── */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin: 20px 0 28px;
}
.two-col .col-card {
  background: var(--fog);
  border-radius: var(--radius);
  padding: 24px;
}
.two-col .col-card:nth-child(2) {
  background: var(--teal-bg);
}
.two-col .col-card h4 {
  font-size: 15px;
  font-weight: 700;
  color: var(--teal);
  margin-bottom: 12px;
}
.two-col .col-card ul {
  margin: 0;
  padding-left: 20px;
}
.two-col .col-card li {
  font-size: 14px;
  margin-bottom: 6px;
}
.two-col .col-card li::marker { color: var(--teal); }

/* For the success/fail two-col */
.two-col .col-card.success { background: var(--green-bg); }
.two-col .col-card.success h4 { color: var(--green); }
.two-col .col-card.success li::marker { color: var(--green); }
.two-col .col-card.fail { background: var(--red-bg); }
.two-col .col-card.fail h4 { color: var(--red); }
.two-col .col-card.fail li::marker { color: var(--red); }

/* ── TRAFFIC LIGHT BADGES ── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  vertical-align: middle;
  white-space: nowrap;
}
.badge::before {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.badge-red { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
.badge-red::before { background: var(--red); }
.badge-amber { background: var(--amber-bg); color: #B45309; border: 1px solid var(--amber-border); }
.badge-amber::before { background: var(--amber); }
.badge-green { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.badge-green::before { background: var(--green); }

/* ── HEALTH CARDS ── */
.health-card {
  background: var(--white);
  border: 1px solid #e5e5e5;
  border-radius: var(--radius);
  padding: 24px 28px;
  margin: 16px 0;
  border-left: 4px solid var(--slate);
  box-shadow: var(--shadow-sm);
}
.health-card.critical { border-left-color: var(--red); }
.health-card.warning { border-left-color: var(--amber); }
.health-card h3 {
  margin: 0 0 12px;
  font-size: 16px;
}
.health-card ul { margin-bottom: 0; }
.health-card li:last-child { margin-bottom: 0; }

/* ── RISK CARDS ── */
.risk-card {
  background: var(--white);
  border: 1px solid #e5e5e5;
  border-radius: var(--radius);
  padding: 24px 28px;
  margin: 16px 0;
  box-shadow: var(--shadow-sm);
  border-left: 4px solid var(--slate);
}
.risk-card.risk-critical { border-left-color: var(--red); }
.risk-card.risk-high { border-left-color: #E65100; }
.risk-card.risk-medium { border-left-color: var(--amber); }
.risk-card.risk-low { border-left-color: #94A3B8; }
.risk-card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.risk-card-header h3 {
  margin: 0;
  font-size: 16px;
  flex: 1;
}
.risk-severity {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
  flex-shrink: 0;
}
.risk-severity::before {
  content: '';
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.sev-critical { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
.sev-critical::before { background: var(--red); }
.sev-high { background: #FFF7ED; color: #C2410C; border: 1px solid #FDBA74; }
.sev-high::before { background: #EA580C; }
.sev-medium { background: var(--amber-bg); color: #92400E; border: 1px solid var(--amber-border); }
.sev-medium::before { background: var(--amber); }
.sev-low { background: var(--fog); color: var(--slate); border: 1px solid #CBD5E1; }
.sev-low::before { background: #94A3B8; }
.risk-card p { font-size: 14px; margin: 0 0 10px; color: var(--graphite); }
.risk-card .risk-opatreni {
  font-size: 13px;
  color: var(--slate);
  padding-top: 10px;
  border-top: 1px solid #f0f0f0;
  margin: 0;
}
.risk-card .risk-opatreni strong { color: var(--graphite); font-weight: 600; }

/* ── TOGGLE / ACCORDION ── */
.toggle {
  border: 1px solid #e5e5e5;
  border-radius: var(--radius);
  margin: 16px 0;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.toggle-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px;
  background: var(--fog);
  cursor: pointer;
  user-select: none;
  gap: 12px;
  transition: background .15s;
}
.toggle-header:hover { background: var(--bone); }
.toggle-header h3, .toggle-header h2 {
  margin: 0;
  font-size: 16px;
  flex: 1;
}
.toggle-header h2 { font-size: 18px; color: var(--teal); }
.toggle-chevron {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
  transition: transform .2s;
  color: var(--slate);
}
.toggle.open .toggle-chevron { transform: rotate(180deg); }
.toggle-body {
  display: none;
  padding: 24px 28px;
  background: var(--white);
}
.toggle-body .table-wrap { border: none; box-shadow: none; border-radius: 0; }
.toggle-body table { font-size: 14px; }
.toggle-body ul { margin-bottom: 0; }
.toggle-body li { font-size: 15px; }
.toggle.open .toggle-body { display: block; }
.toggle-body p:last-child { margin-bottom: 0; }

/* ── ROADMAP ── */
.roadmap-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.roadmap-table th {
  text-align: left;
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--slate);
  background: var(--fog);
  border-bottom: 2px solid #e5e5e5;
}
.roadmap-table td {
  padding: 12px 14px;
  border-bottom: 1px solid #f0f0f0;
  vertical-align: top;
}
.roadmap-table tbody tr:hover { background: var(--fog); }
.roadmap-table .priority-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
}
.roadmap-table .dot-red { background: var(--red); }
.roadmap-table .dot-amber { background: var(--amber); }

/* ── ALTERNATING SECTIONS ── */
.report-section {
  padding: 40px 0 24px;
  position: relative;
  border-radius: var(--radius);
}
.report-section:first-child { padding-top: 0; }
.report-section.section-alt {
  background: var(--fog);
  padding: 40px 36px 32px;
  margin-left: -36px;
  margin-right: -36px;
  mask-image: linear-gradient(to bottom, transparent, black 40px, black calc(100% - 40px), transparent);
  -webkit-mask-image: linear-gradient(to bottom, transparent, black 40px, black calc(100% - 40px), transparent);
}
.report-section.section-alt .kpi-card,
.report-section.section-alt .risk-card,
.report-section.section-alt .toggle,
.report-section.section-alt .callout-key,
.report-section.section-alt .callout-info { background: var(--white); }
.report-section h1 { margin-top: 0; }

/* ── GOLD CTA ── */
.btn-gold {
  background: var(--gold) !important;
  color: var(--graphite) !important;
  font-weight: 600 !important;
}
.btn-gold:hover {
  background: var(--muted-gold) !important;
  color: var(--white) !important;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--graphite);
  color: var(--white);
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  opacity: 0;
  transition: all .3s;
  z-index: 200;
  pointer-events: none;
  box-shadow: 0 4px 20px rgba(0,0,0,.2);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── RESPONSIVE ── */
@media (max-width: 1024px) {
  .content { padding: 36px 32px 80px; }
  .report-hero { margin: -36px -32px 36px; padding: 44px 32px 40px; }
}
@media (max-width: 900px) {
  .sidebar { display: none; }
  .sidebar.open {
    display: block;
    position: fixed;
    top: 56px;
    left: 0;
    width: 280px;
    height: calc(100vh - 56px);
    z-index: 99;
    box-shadow: 4px 0 20px rgba(0,0,0,.1);
  }
  .hamburger { display: block !important; }
  .content { padding: 28px 20px 60px; }
  .report-hero { margin: -28px -20px 32px; padding: 36px 24px 32px; }
  .report-hero h1 { font-size: 24px; }
  .report-hero h2 { font-size: 16px; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .two-col { grid-template-columns: 1fr; }
}
@media (max-width: 480px) {
  .kpi-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .kpi-card { padding: 16px 12px; }
  .kpi-value { font-size: 22px; }
  .top-bar { padding: 0 12px; gap: 6px; }
  .top-bar button { padding: 6px 10px; font-size: 12px; }
  .content h1 { font-size: 24px; }
}

/* ── PRINT ── */
@media print {
  #login-screen, .top-bar, .sidebar, .toast, .hamburger { display: none !important; }
  #app { display: block !important; }
  .layout { display: block; }
  .content {
    max-width: 100%;
    padding: 0;
    font-size: 10pt;
  }
  .report-hero { background: var(--graphite) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; margin: 0 0 24pt; padding: 24pt; }
  .report-hero h1 { color: white !important; }
  .report-hero h2 { color: var(--gold) !important; }
  .content h1 { font-size: 18pt; break-after: avoid; color: var(--teal); }
  .content h2 { font-size: 14pt; break-after: avoid; }
  .content h3 { font-size: 12pt; break-after: avoid; }
  .health-card, .kpi-card, .callout, .toggle, .risk-card { break-inside: avoid; }
  .toggle-body { display: block !important; }
  .toggle-chevron { display: none; }
  .toggle { border: none; box-shadow: none; }
  .toggle-header { background: transparent; padding-left: 0; cursor: default; }
  .table-wrap { overflow: visible; box-shadow: none; }
  .content table { min-width: 0; font-size: 9pt; }
  .kpi-card, .health-card { box-shadow: none; }
  .report-section.section-alt { background: var(--fog) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; mask-image: none; -webkit-mask-image: none; margin: 0; padding-left: 0; padding-right: 0; }
  .btn-gold { background: var(--gold) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .two-col { grid-template-columns: 1fr 1fr; }
  a { color: inherit; text-decoration: none; }
  .section-label { color: var(--teal) !important; }
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <img src="assets/ai-logo-stit.png" alt="Automotive Interims" class="login-shield">
    <img src="assets/ai-logo.png" alt="Automotive Interims" class="login-logo">
    <h2>Závěrečný Report</h2>
    <form id="login-form">
      <input type="text" id="login-user" placeholder="Uživatelské jméno" autocomplete="username" required>
      <input type="password" id="login-pass" placeholder="Heslo" autocomplete="current-password" required>
      <button type="submit">Přihlásit se</button>
    </form>
    <div class="login-error" id="login-error">Nesprávné přihlašovací údaje.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="top-bar">
    <button class="hamburger" id="hamburger-btn" aria-label="Menu">&#9776;</button>
    <span class="top-bar-title">Automotive Interims — Závěrečný Report</span>
    <button class="btn-gold" onclick="window.print()">Uložit jako PDF</button>
    <button onclick="copyForWord()">Kopírovat pro Word</button>
  </div>
  <div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="content" id="report-content"></main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
// ── AUTH ──
const HASH_USER = 'eb05199cbee63683f9524f30f780df2c44a489cfcd42da6fa7155afda1bf2add';
const HASH_PASS = 'd6062cae6b541e71cbd149db6209447809f1494780d9f498b2dec6b598c44f25';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function isLoggedIn() { return sessionStorage.getItem('ai_report_auth') === '1'; }
function setLoggedIn() { sessionStorage.setItem('ai_report_auth', '1'); }

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  const [hu, hp] = await Promise.all([sha256(user), sha256(pass)]);
  if (hu === HASH_USER && hp === HASH_PASS) {
    setLoggedIn();
    showApp();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
});

async function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  await loadReport();
}

// ── STRING-LEVEL MARKDOWN PRE-PROCESSING ──
// All custom blocks (:::label, :::kpi, :::twocol) are converted to HTML
// BEFORE marked.js parses the markdown. This avoids HTML comment issues.
function preprocessMarkdown(md) {
  // 0. :::hero ... ::: → hero header block
  md = md.replace(/^:::hero\n([\s\S]*?)^:::\s*$/gm, (_, body) => {
    const lines = body.trim().split('\n');
    let h1 = '', h2 = '', meta = '';
    lines.forEach(line => {
      const l = line.trim();
      if (l.startsWith('# ') && !l.startsWith('## ')) h1 = l.replace(/^# /, '');
      else if (l.startsWith('## ')) h2 = l.replace(/^## /, '');
      else if (l.length > 0) meta = l;
    });
    return '<div class="report-hero">'
      + '<div class="hero-line"></div>'
      + '<h1>' + h1 + '</h1>'
      + '<h2>' + h2 + '</h2>'
      + '<p>' + meta + '</p>'
      + '</div>\n\n';
  });

  // 1. :::label TEXT → <div class="section-label">TEXT</div>
  md = md.replace(/^:::label\s+(.+)$/gm, '<div class="section-label">$1</div>\n');

  // 2. :::kpi ... ::: → KPI grid HTML
  md = md.replace(/^:::kpi\n([\s\S]*?)^:::\s*$/gm, (_, body) => {
    const lines = body.trim().split('\n').filter(l => l.trim());
    let html = '<div class="kpi-grid">\n';
    lines.forEach((line, i) => {
      const parts = line.split('|').map(s => s.trim());
      if (parts.length >= 2) {
        const val = parts[0];
        const label = parts[1];
        const sub = parts[2] || '';
        const cls = i % 2 === 1 ? ' gold' : '';
        html += '<div class="kpi-card"><div class="kpi-value' + cls + '">' + val + '</div>';
        html += '<div class="kpi-label">' + label + '</div>';
        if (sub) html += '<div class="kpi-sub">' + sub + '</div>';
        html += '</div>\n';
      }
    });
    html += '</div>\n';
    return html;
  });

  // 3. :::twocol ... ---split--- ... ::: → Two-column HTML
  md = md.replace(/^:::twocol\n([\s\S]*?)^:::\s*$/gm, (_, body) => {
    const cols = body.split(/^---split---$/m);
    if (cols.length < 2) return body;
    // Determine if success/fail variant
    const isSuccessFail = body.includes('Podařilo se') || body.includes('Nepodařilo se');
    let html = '<div class="two-col">\n';
    cols.forEach((colMd, i) => {
      let cls = 'col-card';
      if (isSuccessFail) cls += i === 0 ? ' success' : ' fail';
      // Parse each column's markdown separately
      const colHtml = marked.parse(colMd.trim());
      html += '<div class="' + cls + '">' + colHtml + '</div>\n';
    });
    html += '</div>\n';
    return html;
  });

  // 4. :::risk LEVEL ... ::: → risk cards
  // Format: :::risk critical|high|medium|low\nTitle\nDescription\nOpatření\n:::
  const sevLabels = { critical: 'Kritick\u00e9', high: 'Vysok\u00e9', medium: 'St\u0159edn\u00ed', low: 'N\u00edzk\u00e9' };
  md = md.replace(/^:::risk\s+(critical|high|medium|low)\n(.+)\n([\s\S]*?)^:::\s*$/gm, (_, level, title, body) => {
    const lines = body.trim().split('\n');
    // Last line is Opatření, everything else is description
    const opatreni = lines.pop();
    const desc = lines.join(' ');
    const label = sevLabels[level] || level;
    let html = '<div class="risk-card risk-' + level + '">';
    html += '<div class="risk-card-header">';
    html += '<h3>' + title.trim() + '</h3>';
    html += '<span class="risk-severity sev-' + level + '">' + label + '</span>';
    html += '</div>';
    html += '<p>' + desc.trim() + '</p>';
    html += '<p class="risk-opatreni"><strong>Opat\u0159en\u00ed:</strong> ' + opatreni.trim() + '</p>';
    html += '</div>\n';
    return html;
  });

  // 5. :::toggle TITLE | SUBTITLE ... ::: → toggle/accordion HTML
  md = md.replace(/^:::toggle\s+(.+?)(?:\s*\|\s*(.+))?\n([\s\S]*?)^:::\s*$/gm, (_, title, subtitle, body) => {
    const bodyHtml = marked.parse(body.trim());
    let html = '<div class="toggle open">';
    html += '<div class="toggle-header" onclick="this.parentElement.classList.toggle(\'open\')">';
    html += '<div><h2 style="margin:0">' + title.trim() + '</h2>';
    if (subtitle) html += '<div style="font-size:13px;color:#3E4A57;margin-top:2px;font-style:italic">' + subtitle.trim() + '</div>';
    html += '</div>';
    html += '<svg class="toggle-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>';
    html += '</div>';
    html += '<div class="toggle-body">' + bodyHtml + '</div>';
    html += '</div>\n';
    return html;
  });

  return md;
}

// ── LOAD & RENDER ──
async function loadReport() {
  const res = await fetch('content.md', { cache: 'no-cache' });
  let md = await res.text();
  md = preprocessMarkdown(md);
  const html = marked.parse(md);
  const container = document.getElementById('report-content');
  container.innerHTML = html;
  postProcess(container);
  buildTOC(container);
  observeSections();
}

// ── POST-PROCESSING (DOM-level) ──
function postProcess(el) {
  wrapTables(el);
  addHeadingIds(el);
  processCallouts(el);
  replaceEmojiBadges(el);
  fixTwoColHeadings(el);
  styleHealthCards(el);
  wrapSections(el);
}

// Wrap content between sections into divs with alternating backgrounds
function wrapSections(el) {
  const children = Array.from(el.children);
  const sections = [];
  let current = [];

  for (let i = 0; i < children.length; i++) {
    const child = children[i];

    // Hide HRs — sections handle separation now
    if (child.tagName === 'HR') { child.style.display = 'none'; continue; }

    // Section label followed by H1 = start of new section (treat as one unit)
    const isLabel = child.classList && child.classList.contains('section-label');
    const isH1 = child.tagName === 'H1' && !child.closest('.report-hero');

    if (isLabel && current.length > 0) {
      // Check if next sibling is H1 — if so, this label+H1 = new section start
      sections.push(current);
      current = [];
    } else if (isH1 && current.length > 0) {
      // Only start new section if previous node wasn't a section-label (already handled)
      const prev = current[current.length - 1];
      const prevIsLabel = prev && prev.classList && prev.classList.contains('section-label');
      if (!prevIsLabel) {
        sections.push(current);
        current = [];
      }
    }
    current.push(child);
  }
  if (current.length > 0) sections.push(current);

  sections.forEach((nodes, i) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'report-section' + (i % 2 === 1 ? ' section-alt' : '');
    nodes[0].parentNode.insertBefore(wrapper, nodes[0]);
    nodes.forEach(n => wrapper.appendChild(n));
  });
}

function wrapTables(el) {
  el.querySelectorAll('table').forEach(t => {
    if (t.parentElement.classList.contains('table-wrap')) return;
    const wrap = document.createElement('div');
    wrap.className = 'table-wrap';
    t.parentNode.insertBefore(wrap, t);
    wrap.appendChild(t);
  });
}

function addHeadingIds(el) {
  el.querySelectorAll('h1, h2').forEach((h, i) => {
    const id = 'sec-' + h.textContent.trim()
      .toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/(^-|-$)/g, '')
      .substring(0, 50);
    h.id = id || ('sec-' + i);
  });
}

// Convert first <strong> paragraph inside .col-card to <h4>
function fixTwoColHeadings(el) {
  el.querySelectorAll('.col-card').forEach(card => {
    const firstP = card.querySelector('p:first-child');
    if (firstP && firstP.querySelector('strong') && firstP.childNodes.length <= 2) {
      const h4 = document.createElement('h4');
      h4.innerHTML = firstP.querySelector('strong').innerHTML;
      firstP.replaceWith(h4);
    }
  });
}

// ── CALLOUTS ──
// Blockquotes starting with **KEY:** / **WARNING:** / **INFO:** / **MANDÁT:**
function processCallouts(el) {
  el.querySelectorAll('blockquote').forEach(bq => {
    const text = bq.textContent;
    let type = null, label = null;
    if (text.match(/^\s*KEY:/)) { type = 'key'; label = 'Klíčový bod'; }
    else if (text.match(/^\s*WARNING:/)) { type = 'warning'; label = 'Upozornění'; }
    else if (text.match(/^\s*INFO:/)) { type = 'info'; label = 'Poznámka'; }
    else if (text.match(/^\s*MANDÁT:/)) { type = 'mandate'; label = 'Mandát'; }
    if (!type) return;

    const callout = document.createElement('div');
    callout.className = 'callout callout-' + type;
    const labelEl = document.createElement('span');
    labelEl.className = 'callout-label';
    labelEl.textContent = label;
    callout.appendChild(labelEl);

    // Clean up the content — remove the **TYPE:** prefix
    const content = document.createElement('div');
    bq.querySelectorAll('p').forEach(p => {
      const clone = p.cloneNode(true);
      // Remove the bold label from first paragraph
      const strongs = clone.querySelectorAll('strong');
      strongs.forEach(s => {
        if (s.textContent.match(/^(KEY|WARNING|INFO|MANDÁT):$/)) {
          // Remove the strong and any following space
          const next = s.nextSibling;
          if (next && next.nodeType === Node.TEXT_NODE) {
            next.textContent = next.textContent.replace(/^\s*/, '');
          }
          s.remove();
        }
      });
      content.appendChild(clone);
    });
    callout.appendChild(content);
    bq.replaceWith(callout);
  });
}

// ── EMOJI BADGES ──
function replaceEmojiBadges(el) {
  const walk = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
  const nodes = [];
  while (walk.nextNode()) {
    const t = walk.currentNode.textContent;
    if (t.includes('\u{1F534}') || t.includes('\u{1F7E1}') || t.includes('\u{1F7E2}')) {
      nodes.push(walk.currentNode);
    }
  }
  nodes.forEach(node => {
    const span = document.createElement('span');
    span.innerHTML = node.textContent
      .replace(/\u{1F534}/gu, '<span class="badge badge-red">Kritick\u00e9</span>')
      .replace(/\u{1F7E1}/gu, '<span class="badge badge-amber">St\u0159edn\u00ed</span>')
      .replace(/\u{1F7E2}/gu, '<span class="badge badge-green">N\u00edzk\u00e9</span>');
    node.parentNode.replaceChild(span, node);
  });
}

// ── HEALTH CARDS (Section VI) ──
function styleHealthCards(el) {
  const h1s = Array.from(el.querySelectorAll('h1'));
  const sectionStart = h1s.find(h => h.textContent.includes('VI.'));
  if (!sectionStart) return;
  const sectionEnd = h1s[h1s.indexOf(sectionStart) + 1] || null;

  const nodes = [];
  let n = sectionStart.nextElementSibling;
  while (n && n !== sectionEnd) { nodes.push(n); n = n.nextElementSibling; }

  // Find title paragraphs — they have .badge inside <strong>
  const titleIndices = [];
  nodes.forEach((node, i) => {
    if (node.tagName === 'P' && node.querySelector('strong') &&
        (node.querySelector('.badge-red') || node.querySelector('.badge-amber'))) {
      titleIndices.push(i);
    }
  });

  for (let t = titleIndices.length - 1; t >= 0; t--) {
    const startIdx = titleIndices[t];
    const endIdx = t < titleIndices.length - 1 ? titleIndices[t + 1] : nodes.length;
    const titleNode = nodes[startIdx];
    const isCritical = !!titleNode.querySelector('.badge-red');

    const card = document.createElement('div');
    card.className = 'health-card ' + (isCritical ? 'critical' : 'warning');
    const title = document.createElement('h3');
    title.innerHTML = titleNode.innerHTML;
    card.appendChild(title);

    for (let i = startIdx + 1; i < endIdx; i++) {
      if (nodes[i] && nodes[i].tagName !== 'HR') card.appendChild(nodes[i]);
    }
    titleNode.replaceWith(card);
  }
}

// ── TOC ──
function buildTOC(el) {
  const sidebar = document.getElementById('sidebar');
  const headings = el.querySelectorAll('h1[id]');
  let html = '';
  headings.forEach(h => {
    const text = h.textContent.replace(/^#+\s*/, '').trim();
    if (text.length < 3) return;
    html += '<a href="#' + h.id + '">' + text + '</a>';
  });
  sidebar.innerHTML = html;
}

// ── SECTION HIGHLIGHT ──
function observeSections() {
  const headings = document.querySelectorAll('#report-content h1[id]');
  const links = document.querySelectorAll('#sidebar a');
  if (!headings.length) return;
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        links.forEach(l => l.classList.remove('active'));
        const link = document.querySelector('#sidebar a[href="#' + entry.target.id + '"]');
        if (link) link.classList.add('active');
      }
    });
  }, { rootMargin: '-80px 0px -60% 0px' });
  headings.forEach(h => observer.observe(h));
}

// ── CLIPBOARD ──
async function copyForWord() {
  const content = document.getElementById('report-content').innerHTML;
  try {
    await navigator.clipboard.write([
      new ClipboardItem({
        'text/html': new Blob([content], { type: 'text/html' }),
        'text/plain': new Blob([document.getElementById('report-content').innerText], { type: 'text/plain' }),
      })
    ]);
    showToast('Zkop\u00edrov\u00e1no do schr\u00e1nky');
  } catch (err) {
    showToast('Kop\u00edrov\u00e1n\u00ed se nezda\u0159ilo');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── HAMBURGER ──
document.getElementById('hamburger-btn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
});
document.getElementById('sidebar').addEventListener('click', (e) => {
  if (e.target.tagName === 'A') document.getElementById('sidebar').classList.remove('open');
});

// ── INIT ──
if (isLoggedIn()) showApp();
</script>
</body>
</html>
